<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TallyVision - Client Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-emerald-500 text-white text-xl font-bold mb-3 shadow-md shadow-emerald-500/30">TV</div>
                <h1 class="text-xl font-bold text-slate-800">TallyVision</h1>
                <p class="text-sm text-slate-500 mt-1">Client Dashboard Login</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="text-xs font-medium text-slate-500 mb-1 block">Username</label>
                    <input id="username" type="text" required autocomplete="username"
                        class="w-full rounded-lg px-3 py-2.5 text-sm border border-slate-200 focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 outline-none">
                </div>
                <div>
                    <label class="text-xs font-medium text-slate-500 mb-1 block">Password</label>
                    <input id="password" type="password" required autocomplete="current-password"
                        class="w-full rounded-lg px-3 py-2.5 text-sm border border-slate-200 focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 outline-none">
                </div>
                <div id="errorMsg" class="text-xs text-red-500 hidden"></div>
                <button type="submit" id="loginBtn"
                    class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-medium py-2.5 rounded-lg text-sm transition shadow-sm shadow-emerald-500/20">
                    Sign In
                </button>
            </form>
        </div>
        <p class="text-center text-xs text-slate-400 mt-4">Powered by TallyVision</p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            errEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            try {
                const res = await fetch('/vcfo/client/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = '/vcfo/client';
                } else {
                    errEl.textContent = data.error || 'Login failed';
                    errEl.classList.remove('hidden');
                }
            } catch {
                errEl.textContent = 'Connection error. Please try again.';
                errEl.classList.remove('hidden');
            }
            btn.disabled = false;
            btn.textContent = 'Sign In';
        });
    </script>
</body>
</html>
